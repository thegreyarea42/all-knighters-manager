name: Deploy Flutter Web to GitHub Pages

# Publish the demo at https://thegreyarea42.github.io/all-knighters-manager/
# whenever main advances. The historical setup requires GitHub Pages in this
# repo to point at the gh-pages branch /root.

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Manual-trigger inputs. The "debug" flag opts this run into verbose
    # GitHub Actions step logging without making every commit-triggered run
    # noisy. Default is false so routine pushes stay quiet.
    inputs:
      debug:
        description: 'Enable verbose GitHub Actions step logging (ACTIONS_STEP_DEBUG=true).'
        type: boolean
        required: false
        default: false

# peaceiris/actions-gh-pages needs write access to push commits to gh-pages.
permissions:
  contents: write

# Don't pile up overlapping deploys. cancel-in-progress: false queues the
# next push behind the in-flight deploy rather than killing it, so gh-pages
# is never left mid-commit if a quick double-push happens.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Enable GitHub Actions' debug logging only when the workflow was
    # triggered manually with the "debug" input checked. Push-triggered
    # runs and default workflow_dispatch runs stay quiet. GitHub converts
    # boolean env values to "true"/"false" strings; the runner only
    # activates verbose logging when ACTIONS_STEP_DEBUG matches "true".
    env:
      ACTIONS_STEP_DEBUG: ${{ inputs.debug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Static analysis
        run: flutter analyze

      - name: Build web release
        # --base-href /all-knighters-manager/ is required because this is a
        # GitHub project page (served at thegreyarea42.github.io/<repo-name>/).
        # './' is rejected by Flutter with 'should start and end with /', so
        # the path must be a properly-rooted URL prefix matching the live demo.
        run: flutter build web --release --base-href /all-knighters-manager/

      - name: Disable Jekyll on gh-pages
        # Flutter's build emits files (e.g. service worker copy) that Jekyll
        # would otherwise skip or transform. .nojekyll tells GitHub Pages to
        # serve everything verbatim.
        run: touch build/web/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'deploy: gh-pages from ${{ github.sha }}'
          # force_orphan wipes prior deploy artefacts on every run, keeping
          # the gh-pages branch history as a single linear deploy log.
          force_orphan: true
